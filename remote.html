<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RemoteLink — 手機遠端控制</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;700&display=swap');
:root{
  --bg:#080b10; --bg2:#0e1219; --bg3:#151c27; --bg4:#1a2233;
  --cyan:#00d4ff; --c2:rgba(0,212,255,.12);
  --grn:#00ff88; --red:#ff3b5c; --amb:#ffb830; --pur:#a78bfa;
  --txt:#dde8f8; --mut:#4a5c74; --bdr:rgba(0,212,255,.18);
  --mono:'Share Tech Mono',monospace; --sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:9999;}

.view{display:none;width:100%;height:100%;}
.view.active{display:flex;flex-direction:column;}

/* ── ROLE ── */
#v-role{align-items:center;justify-content:center;background:radial-gradient(ellipse 120% 60% at 50% 0%,rgba(0,212,255,.08),transparent 60%);}
.wrap{width:100%;max-width:420px;padding:2rem 1.25rem;}
.brand{text-align:center;margin-bottom:2.5rem;}
.btag{font-family:var(--mono);font-size:10px;letter-spacing:5px;color:var(--cyan);opacity:.5;text-transform:uppercase;margin-bottom:.4rem;}
.brand h1{font-size:2.2rem;font-weight:700;letter-spacing:-1px;}
.brand h1 span{color:var(--cyan);}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
.rcard{background:var(--bg3);border:1px solid var(--bdr);border-radius:16px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:.15s;}
.rcard:hover{border-color:var(--cyan);background:var(--c2);transform:translateY(-2px);}
.rcard:active{transform:scale(.97);}
.rcard .ico{font-size:2.5rem;margin-bottom:.6rem;}
.rcard h2{font-size:.95rem;font-weight:700;margin-bottom:.2rem;}
.rcard p{font-size:11px;color:var(--mut);line-height:1.5;}

/* HTTPS warning card */
.https-warn{
  background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.3);
  border-radius:12px;padding:14px 16px;font-size:12px;
  color:#c97070;line-height:1.8;
}
.https-warn strong{color:var(--red);}
.https-warn code{background:rgba(255,59,92,.15);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--red);}
.https-ok{
  background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);
  border-radius:12px;padding:14px 16px;font-size:12px;
  color:#4aaa75;line-height:1.8;
}
.https-ok strong{color:var(--grn);}
.https-ok code{background:rgba(0,255,136,.12);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--grn);}

/* ── PHONE ── */
#v-phone{position:relative;align-items:center;justify-content:center;}
.ph-wrap{width:100%;max-width:380px;padding:2rem 1.25rem;display:flex;flex-direction:column;gap:1rem;align-items:center;}

.code-card{
  background:var(--bg3);border:1px solid var(--bdr);border-radius:14px;
  padding:1.25rem 2rem;text-align:center;width:100%;
}
.clbl{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--mut);margin-bottom:.4rem;}
.cnum{font-family:var(--mono);font-size:2.8rem;letter-spacing:.35em;color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,.45);}

.pill{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:999px;font-size:12px;font-family:var(--mono);color:var(--mut);
}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex-shrink:0;}
.dot.wait{background:var(--amb);box-shadow:0 0 6px var(--amb);animation:blink 1s infinite;}
.dot.ok{background:var(--grn);box-shadow:0 0 8px var(--grn);animation:blink 2s infinite;}
.dot.err{background:var(--red);box-shadow:0 0 6px var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.big-btn{
  width:100%;padding:15px;background:var(--cyan);color:#000;
  border:none;border-radius:13px;font-family:var(--sans);
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.big-btn:hover{background:#00bce0;}
.big-btn:active{transform:scale(.97);}
.big-btn:disabled{background:var(--bg4);color:var(--mut);cursor:not-allowed;}

/* Error/help panel */
.err-panel{
  width:100%;background:rgba(255,59,92,.07);
  border:1px solid rgba(255,59,92,.25);border-radius:12px;
  padding:14px 16px;font-size:12px;line-height:1.8;color:#c97070;
  display:none;
}
.err-panel strong{color:var(--red);}
.err-panel .fix{
  margin-top:10px;padding:10px 12px;
  background:rgba(0,212,255,.06);border:1px solid var(--bdr);
  border-radius:8px;color:var(--txt);font-size:11px;
}
.err-panel .fix strong{color:var(--cyan);}
.err-panel code{font-family:var(--mono);background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px;font-size:10px;}

/* Phone connected HUD */
#ph-hud{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:8px;
  background:rgba(8,11,16,.92);backdrop-filter:blur(12px);
  border:1px solid var(--bdr);border-radius:999px;
  padding:8px 18px;font-size:12px;font-family:var(--mono);
  z-index:9000;color:var(--grn);pointer-events:none;
}
#rcursor{
  position:fixed;width:30px;height:30px;border:2px solid var(--cyan);
  border-radius:50%;background:rgba(0,212,255,.15);
  transform:translate(-50%,-50%);pointer-events:none;
  box-shadow:0 0 14px rgba(0,212,255,.6);display:none;
  transition:left .05s,top .05s;z-index:9001;
}
.tap-ring{
  position:fixed;width:44px;height:44px;border:2px solid var(--cyan);
  border-radius:50%;transform:translate(-50%,-50%) scale(0);
  pointer-events:none;animation:ripAnim .5s ease-out forwards;z-index:9002;
}
@keyframes ripAnim{to{transform:translate(-50%,-50%) scale(2.2);opacity:0;}}

/* ── COMPUTER ── */
#v-computer{background:var(--bg);}
#pc-form{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.cbox{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--bdr);border-radius:18px;padding:2rem;}
.cbox h2{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;}
.flbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--mut);margin-bottom:.5rem;}
.cinput{
  width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;
  color:var(--cyan);font-family:var(--mono);font-size:1.8rem;
  letter-spacing:.4em;padding:12px 16px;text-align:center;
  outline:none;text-transform:uppercase;margin-bottom:1rem;
}
.cinput:focus{border-color:var(--cyan);}
.go-btn{width:100%;padding:13px;background:var(--cyan);color:#000;border:none;border-radius:11px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:.1s;}
.go-btn:active{transform:scale(.97);}
.emsg{font-size:11px;color:var(--red);margin-top:.5rem;min-height:14px;font-family:var(--mono);}

/* Computer viewer */
#pc-viewer{flex:1;display:none;flex-direction:column;overflow:hidden;}
#pc-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.binfo{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--mut);}
.bsp{flex:1;}
.tbtn{padding:6px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:12px;cursor:pointer;transition:.1s;font-family:var(--sans);white-space:nowrap;}
.tbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.tbtn.on{background:var(--c2);border-color:var(--cyan);color:var(--cyan);}
.tbtn.danger:hover{border-color:var(--red);color:var(--red);}

#vp{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;cursor:crosshair;}
#rvid{max-width:100%;max-height:100%;display:none;object-fit:contain;pointer-events:none;}
#no-vid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;}
.spin{width:36px;height:36px;border:2px solid var(--bdr);border-top-color:var(--cyan);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#no-vid p{font-family:var(--mono);font-size:12px;color:var(--mut);}
#pci{position:absolute;pointer-events:none;width:22px;height:22px;border:1.5px solid var(--cyan);border-radius:50%;opacity:.6;transform:translate(-50%,-50%);display:none;}
#mbadge{position:absolute;bottom:10px;right:10px;font-family:var(--mono);font-size:10px;padding:3px 8px;background:rgba(0,0,0,.7);border:1px solid var(--bdr);border-radius:6px;color:var(--cyan);pointer-events:none;}
#fps-badge{position:absolute;bottom:10px;left:10px;font-family:var(--mono);font-size:10px;padding:3px 8px;background:rgba(0,0,0,.7);border:1px solid var(--bdr);border-radius:6px;color:rgba(0,212,255,.5);pointer-events:none;}

#pc-bot{padding:8px 12px;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#pc-bot input{flex:1;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;}
#pc-bot input:focus{border-color:var(--cyan);}
.sndbtn{padding:8px 16px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
.sndbtn:active{transform:scale(.96);}
#pc-log{font-family:var(--mono);font-size:10px;color:var(--mut);max-height:28px;overflow:hidden;padding:0 12px 5px;background:var(--bg2);flex-shrink:0;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:9px 18px;font-size:12px;font-family:var(--mono);opacity:0;transition:.3s;pointer-events:none;z-index:99999;white-space:nowrap;}
</style>
</head>
<body>

<!-- ── ROLE SELECT ── -->
<div id="v-role" class="view active">
  <div class="wrap">
    <div class="brand">
      <div class="btag">Remote Link</div>
      <h1>手機<span>遠端控制</span></h1>
    </div>
    <div class="rgrid">
      <div class="rcard" onclick="initPhone()">
        <div class="ico">📱</div>
        <h2>手機</h2>
        <p>被控端<br>分享整個螢幕</p>
      </div>
      <div class="rcard" onclick="showPCForm()">
        <div class="ico">🖥️</div>
        <h2>電腦</h2>
        <p>控制端<br>輸入配對碼控制</p>
      </div>
    </div>
    <div id="https-status"></div>
  </div>
</div>

<!-- ── PHONE ── -->
<div id="v-phone" class="view">
  <div class="ph-wrap">
    <div class="code-card">
      <div class="clbl">配對碼</div>
      <div class="cnum" id="ph-code">──────</div>
    </div>

    <div class="pill">
      <div class="dot wait" id="ph-dot"></div>
      <span id="ph-status">初始化中...</span>
    </div>

    <button class="big-btn" id="sh-btn" onclick="reqScreen()" disabled>
      <span>📺</span> 分享整個螢幕
    </button>

    <!-- Error panel with diagnosis -->
    <div class="err-panel" id="err-panel">
      <div id="err-msg"></div>
      <div class="fix" id="fix-hint"></div>
    </div>

    <!-- Connected status -->
    <div id="ph-hud"><div class="dot ok" style="width:6px;height:6px;margin:0;"></div><span>電腦控制中</span></div>
  </div>

  <!-- Remote cursor -->
  <div id="rcursor"></div>
</div>

<!-- ── COMPUTER ── -->
<div id="v-computer" class="view">
  <div id="pc-form">
    <div class="cbox">
      <h2>🖥️ 連線至手機</h2>
      <div class="flbl">輸入手機的配對碼</div>
      <input class="cinput" id="pc-cin" maxlength="6" placeholder="XXXXXX"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
        onkeydown="if(event.key==='Enter')pcConn()">
      <button class="go-btn" onclick="pcConn()">連線</button>
      <div class="emsg" id="pc-err"></div>
    </div>
  </div>

  <div id="pc-viewer">
    <div id="pc-bar">
      <div class="binfo"><div class="dot ok"></div><span id="pc-lbl">已連線</span></div>
      <div class="bsp"></div>
      <button class="tbtn on" id="b-click" onclick="setMode('click')">👆 點擊</button>
      <button class="tbtn" id="b-scroll" onclick="setMode('scroll')">↕ 滾動</button>
      <button class="tbtn" id="b-swipe" onclick="setMode('swipe')">⟵ 滑動</button>
      <button class="tbtn danger" onclick="pcDisc()">✕ 斷線</button>
    </div>
    <div id="vp">
      <video id="rvid" autoplay playsinline muted></video>
      <div id="no-vid">
        <div class="spin"></div>
        <p id="no-vid-txt">等待手機分享螢幕...</p>
      </div>
      <div id="pci"></div>
      <div id="mbadge">MODE: CLICK</div>
      <div id="fps-badge">-- fps</div>
    </div>
    <div id="pc-bot">
      <input type="text" id="pc-msg" placeholder="傳訊息到手機..." onkeydown="if(event.key==='Enter')sndMsg()">
      <button class="sndbtn" onclick="sndMsg()">送出</button>
    </div>
    <div id="pc-log">&nbsp;</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ HTTPS CHECK ══
// getDisplayMedia requires HTTPS. Diagnose the environment on page load.
(function(){
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const el = document.getElementById('https-status');
  if (!el) return;
  if (isSecure) {
    el.className = 'https-ok';
    el.innerHTML = `<strong>✅ 環境正常</strong> — 目前是 HTTPS，可以使用螢幕分享。<br>
    手機和電腦打開同一個網址，選擇各自的角色即可。`;
  } else {
    el.className = 'https-warn';
    el.innerHTML = `<strong>⚠️ 需要 HTTPS！</strong><br>
    <code>getDisplayMedia</code> 在 HTTP 下會報錯「is not a function」。<br><br>
    <strong>解法 — 免費部署到 HTTPS：</strong><br>
    ① 把這個 HTML 檔拖到 <a href="https://app.netlify.com/drop" target="_blank" style="color:var(--cyan);">netlify.com/drop</a><br>
    ② 得到 <code>https://xxx.netlify.app</code> 網址<br>
    ③ 手機和電腦各自打開這個網址即可`;
  }
})();

// ══ GLOBALS ══
let peer=null, dconn=null, mcall=null, cmode='click', dnPos=null;
let screenStream=null;

// ══ UTILS ══
function sv(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(m,c){
  const t=document.getElementById('toast');
  t.textContent=m; t.style.color=c||'var(--txt)';
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},3500);
}
function plog(m){document.getElementById('pc-log').textContent='> '+m;}
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

// ══ PHONE INIT ══
function initPhone(){
  sv('v-phone');
  const isSecure = location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1';

  if(!isSecure){
    document.getElementById('ph-dot').className='dot err';
    document.getElementById('ph-status').textContent='需要 HTTPS！';
    document.getElementById('sh-btn').disabled=true;
    showErr(
      '<strong>❌ 無法使用螢幕分享</strong><br>目前頁面是 HTTP，瀏覽器不提供 <code>navigator.mediaDevices</code>。',
      '<strong>解法：</strong> 把此 HTML 部署到 HTTPS 網址。<br>' +
      '推薦免費方案：<a href="https://app.netlify.com/drop" target="_blank" style="color:var(--cyan);">Netlify Drop</a> — 拖曳上傳即可得到 HTTPS 網址'
    );
    return;
  }

  if(!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function'){
    document.getElementById('ph-dot').className='dot err';
    document.getElementById('ph-status').textContent='瀏覽器不支援';
    showErr(
      '<strong>❌ 此瀏覽器不支援 <code>getDisplayMedia</code></strong>',
      '<strong>請改用：</strong> Android → Chrome 94+<br>iOS 不支援螢幕分享（Apple 限制）<br>電腦測試 → Chrome / Edge / Firefox'
    );
    return;
  }

  const code=genCode();
  document.getElementById('ph-code').textContent=code;
  document.getElementById('ph-status').textContent='建立連線點...';

  peer=new Peer('rl-'+code,{debug:0});
  peer.on('open',()=>{
    document.getElementById('ph-status').textContent='等待電腦連線...';
    document.getElementById('sh-btn').disabled=false;
  });
  peer.on('error',e=>{
    if(e.type==='unavailable-id'){peer.destroy();initPhone();return;}
    showErr('PeerJS 錯誤: '+e.type,'請重新整理頁面再試');
  });

  // Data channel from computer
  peer.on('connection',c=>{
    dconn=c;
    c.on('open',()=>{
      document.getElementById('ph-dot').className='dot ok';
      document.getElementById('ph-status').textContent='電腦已連線！';
      document.getElementById('ph-hud').style.display='flex';
      toast('電腦已連線！','var(--grn)');
    });
    c.on('data',handleCmd);
    c.on('close',phDisc);
  });

  // Media call
  peer.on('call',call=>{
    mcall=call;
    // Answer with existing stream, or null until user grants permission
    call.answer(screenStream || new MediaStream());
    call.on('close',()=>{});
    call.on('error',e=>{plog('call error: '+e);});
  });
}

function showErr(msg, hint){
  const panel=document.getElementById('err-panel');
  document.getElementById('err-msg').innerHTML=msg;
  document.getElementById('fix-hint').innerHTML=hint;
  panel.style.display='block';
}

// ══ SCREEN SHARE ══
async function reqScreen(){
  const btn=document.getElementById('sh-btn');
  btn.disabled=true; btn.innerHTML='<span>⏳</span> 請求權限...';

  try{
    // Request full screen capture
    screenStream=await navigator.mediaDevices.getDisplayMedia({
      video:{
        frameRate:{ideal:30,max:60},
        width:{ideal:window.screen.width},
        height:{ideal:window.screen.height},
        cursor:'always',               // show cursor in capture
        displaySurface:'monitor'       // hint: prefer full screen
      },
      audio:false,
      // Android Chrome: shows picker for screen/app/tab
      // Desktop: shows picker for screen/window/tab
      preferCurrentTab:false,
      selfBrowserSurface:'exclude',
      systemAudio:'exclude',
    });

    btn.innerHTML='<span>✅</span> 螢幕分享中';
    document.getElementById('ph-status').textContent='分享中，等待電腦連線...';
    toast('螢幕分享成功！','var(--grn)');

    // If computer already called us, update the track
    if(mcall && mcall.peerConnection){
      const pc=mcall.peerConnection;
      const sender=pc.getSenders().find(s=>s.track&&s.track.kind==='video');
      const newTrack=screenStream.getVideoTracks()[0];
      if(sender) await sender.replaceTrack(newTrack);
      else pc.addTrack(newTrack,screenStream);
    }

    // When user stops sharing from system UI
    screenStream.getVideoTracks()[0].addEventListener('ended',()=>{
      screenStream=null;
      btn.disabled=false;
      btn.innerHTML='<span>📺</span> 重新分享螢幕';
      document.getElementById('ph-status').textContent='分享已停止，點按鈕重新分享';
      toast('螢幕分享已停止','var(--amb)');
    });

  }catch(err){
    btn.disabled=false;
    btn.innerHTML='<span>📺</span> 分享整個螢幕';

    const fixes={
      NotAllowedError:'使用者取消了授權，或瀏覽器禁止。<br>請點允許/Share 按鈕。',
      NotSupportedError:'此瀏覽器版本不支援 getDisplayMedia。<br>Android 請升級 Chrome 到 94+。',
      NotFoundError:'找不到可分享的螢幕。',
      AbortError:'操作被中斷，請再試一次。',
      InvalidStateError:'狀態錯誤，請重新整理頁面。',
      TypeError:'參數錯誤 ('+err.message+')。',
    };
    showErr(
      '<strong>❌ '+err.name+'</strong><br>'+(fixes[err.name]||err.message),
      err.name==='NotSupportedError'
        ? '<strong>Android 版本要求：</strong> Chrome 94+（2021年10月後）<br>目前版本可能太舊，請更新 Chrome。'
        : '<strong>提示：</strong> 確保在 HTTPS 下並使用支援的瀏覽器'
    );
  }
}

// ══ HANDLE REMOTE COMMANDS ══
function handleCmd(d){
  if(!d||!d.type)return;
  const cur=document.getElementById('rcursor');

  if(d.type==='move'){
    cur.style.display='block';
    cur.style.left=(d.x*window.innerWidth)+'px';
    cur.style.top=(d.y*window.innerHeight)+'px';
    return;
  }

  if(d.type==='tap'){
    const cx=d.x*window.innerWidth, cy=d.y*window.innerHeight;
    cur.style.display='block';
    cur.style.left=cx+'px'; cur.style.top=cy+'px';
    const r=document.createElement('div');
    r.className='tap-ring';
    r.style.left=cx+'px'; r.style.top=cy+'px';
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),600);

    // Dispatch real events to whatever element is under the cursor
    const el=document.elementFromPoint(cx,cy);
    if(el&&el!==cur){
      el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,clientX:cx,clientY:cy}));
      el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true,clientX:cx,clientY:cy}));
      el.dispatchEvent(new MouseEvent('click',{bubbles:true,clientX:cx,clientY:cy}));
      try{
        const t=new Touch({identifier:Date.now(),target:el,clientX:cx,clientY:cy,pageX:cx+scrollX,pageY:cy+scrollY,screenX:cx,screenY:cy});
        el.dispatchEvent(new TouchEvent('touchstart',{bubbles:true,cancelable:true,touches:[t],targetTouches:[t],changedTouches:[t]}));
        setTimeout(()=>{el.dispatchEvent(new TouchEvent('touchend',{bubbles:true,cancelable:true,touches:[],targetTouches:[],changedTouches:[t]}));},50);
      }catch(e){}
      if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.focus();
    }
    if(navigator.vibrate)navigator.vibrate(25);
    return;
  }

  if(d.type==='scroll'){
    window.scrollBy({top:d.dy*200,behavior:'smooth'});
    return;
  }

  if(d.type==='swipe'){
    const cx=d.x*window.innerWidth, cy=d.y*window.innerHeight;
    const ex=d.ex*window.innerWidth, ey=d.ey*window.innerHeight;
    const el=document.elementFromPoint(cx,cy)||document.scrollingElement||document.body;
    try{
      const mk=(x,y)=>new Touch({identifier:1,target:el,clientX:x,clientY:y,pageX:x+scrollX,pageY:y+scrollY,screenX:x,screenY:y});
      const ts=mk(cx,cy), te=mk(ex,ey);
      el.dispatchEvent(new TouchEvent('touchstart',{bubbles:true,cancelable:true,touches:[ts],targetTouches:[ts],changedTouches:[ts]}));
      setTimeout(()=>{
        el.dispatchEvent(new TouchEvent('touchmove',{bubbles:true,cancelable:true,touches:[te],targetTouches:[te],changedTouches:[te]}));
        setTimeout(()=>{
          el.dispatchEvent(new TouchEvent('touchend',{bubbles:true,cancelable:true,touches:[],targetTouches:[],changedTouches:[te]}));
        },80);
      },80);
    }catch(e){}
    if(navigator.vibrate)navigator.vibrate([15,25,15]);
    return;
  }

  if(d.type==='key'){
    const a=document.activeElement;
    if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA')){
      if(d.key==='Backspace') a.value=a.value.slice(0,-1);
      else if(d.key==='Enter') a.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));
      else if(d.key.length===1) a.value+=d.key;
    }
    document.dispatchEvent(new KeyboardEvent('keydown',{key:d.key,bubbles:true,cancelable:true}));
    return;
  }

  if(d.type==='msg'){toast('💬 '+d.text);return;}
  if(d.type==='vibrate'){if(navigator.vibrate)navigator.vibrate([80,40,80,40,120]);toast('📳 震動','var(--amb)');return;}
}

function phDisc(){
  document.getElementById('ph-dot').className='dot wait';
  document.getElementById('ph-status').textContent='電腦已斷線，等待重連...';
  document.getElementById('ph-hud').style.display='none';
  document.getElementById('rcursor').style.display='none';
  toast('電腦已斷線','var(--red)');
  dconn=null; mcall=null;
}

// ══ COMPUTER ══
function showPCForm(){sv('v-computer');}

function pcConn(){
  const code=document.getElementById('pc-cin').value.trim().toUpperCase();
  if(code.length!==6){document.getElementById('pc-err').textContent='請輸入完整6位碼';return;}
  document.getElementById('pc-err').textContent='';

  peer=new Peer({debug:0});
  peer.on('open',()=>{
    // 1. Data channel
    dconn=peer.connect('rl-'+code,{reliable:true});
    dconn.on('open',()=>{
      plog('資料通道已連線');
      toast('已連線','var(--grn)');
      document.getElementById('pc-lbl').textContent='已連線 · '+code;
    });
    dconn.on('close',()=>{toast('連線中斷','var(--red)');pcDisc();});
    dconn.on('error',()=>{document.getElementById('pc-err').textContent='連線失敗，請確認配對碼';});

    // 2. Media call (empty stream → phone answers with screen stream)
    const call=peer.call('rl-'+code,new MediaStream());
    mcall=call;
    call.on('stream',rs=>{
      const v=document.getElementById('rvid');
      v.srcObject=rs; v.play().catch(()=>{});
      v.style.display='block';
      document.getElementById('no-vid').style.display='none';
      plog('影像串流已接收');
      toast('已接收手機畫面！','var(--grn)');
      trackFPS(v);
    });
    call.on('error',e=>plog('media err: '+e));

    document.getElementById('pc-form').style.display='none';
    document.getElementById('pc-viewer').style.display='flex';
    setupVP();
  });
  peer.on('error',e=>{
    const m=e.type==='peer-unavailable'?'找不到手機，請確認配對碼':'錯誤: '+e.type;
    document.getElementById('pc-err').textContent=m;
    peer.destroy(); peer=null;
  });
}

function trackFPS(video){
  const cv=document.createElement('canvas'); cv.width=2; cv.height=2;
  const ctx=cv.getContext('2d');
  let frames=0, last=Date.now();
  (function tick(){
    try{ctx.drawImage(video,0,0,2,2); frames++;}catch(e){}
    const now=Date.now();
    if(now-last>=1000){
      document.getElementById('fps-badge').textContent=frames+' fps';
      frames=0; last=now;
    }
    requestAnimationFrame(tick);
  })();
}

function setupVP(){
  const vp=document.getElementById('vp');
  const video=document.getElementById('rvid');
  const ci=document.getElementById('pci');

  function rel(e){
    const r=video.getBoundingClientRect();
    if(!r.width||!r.height)return null;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{
      x:Math.min(1,Math.max(0,(cx-r.left)/r.width)),
      y:Math.min(1,Math.max(0,(cy-r.top)/r.height))
    };
  }

  vp.addEventListener('mousemove',e=>{
    const p=rel(e);
    if(!p||!dconn)return;
    const vpR=vp.getBoundingClientRect();
    ci.style.display='block';
    ci.style.left=(e.clientX-vpR.left)+'px';
    ci.style.top=(e.clientY-vpR.top)+'px';
    dconn.send({type:'move',x:p.x,y:p.y});
  });
  vp.addEventListener('mouseleave',()=>{ci.style.display='none';});

  let dn=false;
  vp.addEventListener('pointerdown',e=>{e.preventDefault();dn=true;dnPos=rel(e);});
  vp.addEventListener('pointerup',e=>{
    if(!dn)return; dn=false;
    const up=rel(e);
    if(!up||!dconn)return;
    const dx=up.x-(dnPos?.x||up.x), dy=up.y-(dnPos?.y||up.y);
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(cmode==='swipe'&&dist>0.03&&dnPos){
      dconn.send({type:'swipe',x:dnPos.x,y:dnPos.y,ex:up.x,ey:up.y});
      plog('SWIPE');
    }else{
      dconn.send({type:'tap',x:up.x,y:up.y});
      plog('TAP ('+Math.round(up.x*100)+'%, '+Math.round(up.y*100)+'%)');
    }
  });

  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    if(!dconn)return;
    dconn.send({type:'scroll',dy:e.deltaY>0?1:-1});
  },{passive:false});

  document.addEventListener('keydown',e=>{
    if(!dconn||e.target.tagName==='INPUT')return;
    const fw=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Escape',' ','Backspace'];
    if(fw.includes(e.key)||(e.key.length===1&&!e.ctrlKey&&!e.metaKey)){
      e.preventDefault();
      dconn.send({type:'key',key:e.key});
    }
  });
}

function setMode(m){
  cmode=m;
  ['click','scroll','swipe'].forEach(x=>document.getElementById('b-'+x).classList.toggle('on',x===m));
  document.getElementById('mbadge').textContent='MODE: '+m.toUpperCase();
  const cur={click:'crosshair',scroll:'ns-resize',swipe:'ew-resize'};
  document.getElementById('vp').style.cursor=cur[m];
}

function sndMsg(){
  const i=document.getElementById('pc-msg');
  if(!i.value.trim()||!dconn)return;
  dconn.send({type:'msg',text:i.value.trim()});
  i.value=''; plog('MSG sent');
}

function pcDisc(){
  if(dconn)dconn.close();
  if(mcall)mcall.close();
  if(peer)peer.destroy();
  dconn=null; mcall=null; peer=null;
  document.getElementById('pc-form').style.display='flex';
  document.getElementById('pc-viewer').style.display='none';
  const v=document.getElementById('rvid');
  v.srcObject=null; v.style.display='none';
  document.getElementById('no-vid').style.display='flex';
  document.getElementById('pc-cin').value='';
}
</script>
