<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuaShield Deobfuscator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080a0f;--bg2:#0d1017;--bg3:#141820;
  --gold:#f5c542;--gold2:#e6b020;--gold3:rgba(245,197,66,.1);
  --border:rgba(255,255,255,.07);--border2:rgba(245,197,66,.25);
  --text:#e8eaf0;--muted:#5a6070;--green:#4ade80;--red:#f87171;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
.wrap{max-width:900px;margin:0 auto;padding:40px 20px 80px}
header{text-align:center;margin-bottom:44px}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px}
.logo svg{color:var(--gold)}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.logo-text span{color:var(--gold)}
h1{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;margin-bottom:10px}
h1 em{font-style:normal;color:var(--gold)}
.sub{color:var(--muted);font-size:13px;line-height:1.7}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;padding:14px;min-height:220px;line-height:1.6;resize:vertical;transition:border .2s}
textarea:focus{border-color:var(--border2)}

.btn{width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;transition:all .2s;letter-spacing:.5px}
.btn-gold{background:var(--gold);color:#0a0a0a}
.btn-gold:hover{background:var(--gold2);box-shadow:0 0 24px rgba(245,197,66,.25);transform:translateY(-1px)}
.btn-clear{background:var(--bg3);color:var(--muted);border:1px solid var(--border);margin-top:8px}
.btn-clear:hover{color:var(--text);border-color:var(--border2)}
.btn-copy{background:var(--bg3);color:var(--gold);border:1px solid var(--border2);padding:8px 16px;border-radius:7px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s}
.btn-copy:hover{background:var(--gold3)}

.status{padding:12px 16px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none;align-items:center;gap:8px}
.status.ok{display:flex;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--green)}
.status.err{display:flex;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.status.info{display:flex;background:rgba(245,197,66,.08);border:1px solid var(--border2);color:var(--gold)}

.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.info-box .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.info-box .val{font-size:14px;font-weight:700;color:var(--gold)}

.out-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.out-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;max-height:420px;overflow-y:auto;color:var(--text)}
.out-box:empty::before{content:'解碼結果將顯示在這裡';color:var(--muted)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2L3 6v4c0 4 3.5 7.5 7 8 3.5-.5 7-4 7-8V6L10 2z"/></svg>
      <span class="logo-text">Lua<span>Shield</span></span>
    </div>
    <h1>Self <em>Deobfuscator</em></h1>
    <p class="sub">自動解碼你自己的 LuaShield 混淆腳本<br>支援 base-85 格式（lua_vm.txt 版本）</p>
  </header>

  <div class="card">
    <div class="card-title">混淆後的腳本</div>
    <label>把混淆輸出全部貼在這裡</label>
    <textarea id="inputCode" placeholder="--[[ Protect by LuaShield ]]&#10;return(function()...end)()"></textarea>
  </div>

  <div class="card" style="padding:18px 24px">
    <button class="btn btn-gold" onclick="deobfuscate()">⚡ 自動解碼</button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="infoCard" style="display:none">
    <div class="card-title">提取資訊</div>
    <div class="info-grid">
      <div class="info-box"><div class="lbl">格式</div><div class="val" id="iFormat">—</div></div>
      <div class="info-box"><div class="lbl">Segments</div><div class="val" id="iSegs">—</div></div>
      <div class="info-box"><div class="lbl">原始大小</div><div class="val" id="iSize">—</div></div>
    </div>
  </div>

  <div class="card" id="outputCard" style="display:none">
    <div class="out-header">
      <div class="card-title" style="margin:0">解碼結果</div>
      <button class="btn-copy" onclick="copyResult()">複製</button>
    </div>
    <div class="out-box" id="output"></div>
    <button class="btn btn-clear" onclick="clearAll()">清除</button>
  </div>

  <footer>LuaShield Self-Deobfuscator — 僅供腳本擁有者使用</footer>
</div>

<script>
// ── Base-85 decoder (reverse of the passVM encoder) ──────────
function decodeBase85(encoded) {
  // Step 1: replace "z" with "!!!!!" (base-85 zero shorthand)
  let s = encoded.replace(/z/g, '!!!!!')
  
  // Step 2: decode groups of 5 chars → 4 bytes (little-endian)
  const bytes = []
  for (let i = 0; i + 4 < s.length; i += 5) {
    const p = s.charCodeAt(i)   - 33
    const b = s.charCodeAt(i+1) - 33
    const d = s.charCodeAt(i+2) - 33
    const t = s.charCodeAt(i+3) - 33
    const u = s.charCodeAt(i+4) - 33
    // Formula from VM: (i-33)+(t-33)*85+(d-33)*7225+(b-33)*614125+(p-33)*52200625
    // But note: the VM uses (p,b,d,t,i) as the 5 bytes from string.byte(_,1,5)
    // and then L=(i-33)+(t-33)*85+(d-33)*7225+(b-33)*614125+(p-33)*52200625
    const L = u + t*85 + d*7225 + b*614125 + p*52200625
    // string.pack("<I4", L) → 4 bytes little-endian
    bytes.push(L & 0xFF)
    bytes.push((L >> 8) & 0xFF)
    bytes.push((L >> 16) & 0xFF)
    bytes.push((L >> 24) & 0xFF)
  }
  return bytes
}

// ── Extract long-string segments from Lua code ────────────────
function extractSegments(code) {
  // Properly extract Lua long strings by matching bracket level
  // [===[content]===] — content can contain ] but not ]===]
  const segs = []
  let i = 0
  while (i < code.length) {
    if (code[i] === '[') {
      let j = i + 1
      let eqCount = 0
      while (j < code.length && code[j] === '=') { eqCount++; j++ }
      if (j < code.length && code[j] === '[') {
        // Found [=..=[ opener
        const closePattern = ']' + '='.repeat(eqCount) + ']'
        const contentStart = j + 1
        const closeIdx = code.indexOf(closePattern, contentStart)
        if (closeIdx !== -1 && closeIdx - contentStart > 10) {
          // Only take segments that look like base-85 data (long enough)
          segs.push(code.substring(contentStart, closeIdx))
          i = closeIdx + closePattern.length
          continue
        }
      }
    }
    i++
  }
  return segs
}

// ── Main deobfuscate ──────────────────────────────────────────
function deobfuscate() {
  const code = document.getElementById('inputCode').value.trim()
  if (!code) { showStatus('❌ 請貼上混淆後的腳本', 'err'); return }
  
  showStatus('⏳ 分析中...', 'info')
  
  try {
    // Detect format
    const isBase85 = code.includes('52200625') || 
                     code.includes('614125') || 
                     code.includes('string.pack') ||
                     (code.includes('[=') && code.includes(']='))
    
    const isXOR = code.includes('PlaceId%256') && 
                  !code.includes('52200625')
    
    if (isXOR) {
      decodeXOR(code)
      return
    }
    
    if (!isBase85) {
      showStatus('❌ 無法識別格式，請確認是 LuaShield 混淆的腳本', 'err')
      return
    }
    
    // Base-85 format
    const segs = extractSegments(code)
    if (!segs.length) {
      showStatus('❌ 找不到加密段落，腳本格式可能不完整', 'err')
      return
    }
    
    // Concatenate all segments
    let combined = segs.join('')
    
    // Strip first 6 chars (SIG = 6 chars; Lua string.sub(str,7) = JS substring(6))
    combined = combined.substring(6)
    
    // Decode base-85
    const bytes = decodeBase85(combined)
    
    // Convert bytes to UTF-8 string (handles Chinese/multi-byte chars)
    let trimEnd = bytes.length
    while (trimEnd > 0 && bytes[trimEnd-1] === 0) trimEnd--
    const result = new TextDecoder('utf-8').decode(new Uint8Array(bytes.slice(0, trimEnd))).trim()
    
    if (!result || result.length < 2) {
      showStatus('❌ 解碼失敗，腳本可能已損壞', 'err')
      return
    }
    
    // Show info
    document.getElementById('infoCard').style.display = 'block'
    document.getElementById('iFormat').textContent = 'Base-85'
    document.getElementById('iSegs').textContent = segs.length
    document.getElementById('iSize').textContent = result.length + ' chars'
    
    // Show result
    document.getElementById('outputCard').style.display = 'block'
    document.getElementById('output').textContent = result
    
    const looksLikeLua = /^[\s\S]*?(local|print|--|\w+\s*=|if |for |function |game\.)/.test(result.substring(0, 200))
    if (looksLikeLua) {
      showStatus('✅ 解碼成功！', 'ok')
    } else {
      showStatus('⚠️ 解碼完成，但結果可能不完整', 'info')
    }
    
  } catch(e) {
    showStatus('❌ 錯誤: ' + e.message, 'err')
    console.error(e)
  }
}

// ── XOR format decoder (newer passVM) ────────────────────────
function decodeXOR(code) {
  const primes = new Set([131,137,139,149,151,157,163,167,173,179,181,191,193,197,199,211])
  const lines = code.split('\n')
  const keys = [], muls = []
  let dataLine = ''

  for (const line of lines) {
    const t = line.trim()
    const km = t.match(/^local\s+\S+=\((\d+)\+/)
    if (km && t.endsWith('%256')) { keys.push(parseInt(km[1])); continue }
    const mm = t.match(/^local\s+\S+=(\d+)$/)
    if (mm && primes.has(parseInt(mm[1]))) { muls.push(parseInt(mm[1])); continue }
    if (t.match(/^local\s+\S+=\{\d/) && t.includes(',') && t.length > dataLine.length) dataLine = t
  }

  if (keys.length < 2 || muls.length < 2 || !dataLine) {
    showStatus('❌ 無法提取 XOR 參數', 'err'); return
  }

  const K1=keys[0], K2=keys[1], M1=muls[0], M2=muls[1]
  const dataStr = dataLine.match(/\{([\d,\s]+)\}/)?.[1] || ''
  const data = dataStr.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n))

  const A=[]; let k=K2
  for(let i=0;i<data.length;i++){A.push((data[i]^k)&0xFF);k=(k*M2+(i+7))%256}
  const B=[]; k=K1
  for(let i=0;i<A.length;i++){B.push((A[i]^k)&0xFF);k=(k*M1+(i+3))%256}
  const result = B.map(x=>String.fromCharCode(x)).join('').trim()

  document.getElementById('infoCard').style.display = 'block'
  document.getElementById('iFormat').textContent = 'XOR'
  document.getElementById('iSegs').textContent = `K1=${K1} M1=${M1}`
  document.getElementById('iSize').textContent = result.length + ' chars'
  document.getElementById('outputCard').style.display = 'block'
  document.getElementById('output').textContent = result
  showStatus('✅ 解碼成功！（XOR 格式）', 'ok')
}

function showStatus(msg, type) {
  const el = document.getElementById('status')
  el.textContent = msg
  el.className = 'status ' + type
}

function copyResult() {
  const text = document.getElementById('output').textContent
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy')
    btn.textContent = '✓ 已複製'
    setTimeout(() => btn.textContent = '複製', 1500)
  })
}

function clearAll() {
  document.getElementById('inputCode').value = ''
  document.getElementById('output').textContent = ''
  document.getElementById('outputCard').style.display = 'none'
  document.getElementById('infoCard').style.display = 'none'
  document.getElementById('status').className = 'status'
}
</script>
</body>
</html>
